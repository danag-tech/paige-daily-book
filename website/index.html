<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paige每日荐书</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-nav" aria-label="页面导航">
    <a class="nav-brand" href="#top">Paige每日荐书</a>
    <div class="nav-actions">
      <a href="#today">今日推荐</a>
      <a href="#recent">近期荐书</a>
    </div>
  </nav>

  <main id="top" class="page-shell">
    <header class="site-header">
      <p class="eyebrow">PAIGE BOOK DAILY</p>
      <h1>Paige每日荐书</h1>
      <p class="intro">每天推荐三本好书，记录持续积累的阅读选择。</p>
    </header>

    <section id="today" class="home-section today-section" aria-labelledby="today-heading">
      <div class="section-head">
        <p class="eyebrow">Today</p>
        <h2 id="today-heading">今日推荐</h2>
      </div>
      <div id="today-list" class="today-list" aria-live="polite">
        <p class="loading">正在加载今日推荐...</p>
      </div>
    </section>

    <section class="home-section subscribe-panel" aria-labelledby="subscribe-heading">
      <div>
        <p class="eyebrow">Email Digest</p>
        <h2 id="subscribe-heading">邮箱订阅</h2>
        <p class="subscribe-copy">输入邮箱订阅每日荐书，发布后会收到 Paige 自动发送的阅读邮件。</p>
      </div>
      <form id="subscribe-form" class="subscribe-form" aria-label="邮箱订阅表单">
        <input id="subscribe-email" type="email" placeholder="your@email.com" aria-label="邮箱地址" autocomplete="email" required>
        <button id="subscribe-button" type="submit">订阅</button>
        <p id="subscribe-status" class="subscribe-status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section id="recent" class="home-section" aria-labelledby="recent-heading">
      <div class="section-head">
        <p class="eyebrow">Archive</p>
        <h2 id="recent-heading">最近 15 本荐书</h2>
      </div>
      <div id="book-list" class="book-list" aria-live="polite">
        <p class="loading">正在加载书单...</p>
      </div>
    </section>
  </main>

  <template id="book-card-template">
    <article class="book-card">
      <div class="cover-wrap"></div>
      <div class="book-content">
        <p class="book-date"></p>
        <h3 class="book-title"></h3>
        <p class="book-meta"></p>
        <p class="book-rating"></p>
        <p class="book-summary"></p>
        <a class="detail-link" href="book.html">查看详情</a>
      </div>
    </article>
  </template>

  <script src="site_config.js"></script>
  <script>
    const recentList = document.querySelector("#book-list");
    const todayList = document.querySelector("#today-list");
    const template = document.querySelector("#book-card-template");
    const subscribeForm = document.querySelector("#subscribe-form");
    const subscribeEmail = document.querySelector("#subscribe-email");
    const subscribeButton = document.querySelector("#subscribe-button");
    const subscribeStatus = document.querySelector("#subscribe-status");

    function normalizeText(value, fallback) {
      if (typeof value !== "string") {
        return fallback;
      }
      const text = value.trim();
      return text || fallback;
    }

    function createSummaryExcerpt(summary) {
      const text = normalizeText(summary, "暂无简介");
      if (text.length <= 120) {
        return text;
      }
      return `${text.slice(0, 120)}…`;
    }

    function createCover(book) {
      const cover = normalizeText(book.cover, "");
      if (!cover) {
        const placeholder = document.createElement("div");
        placeholder.className = "cover-placeholder";
        placeholder.textContent = "暂无封面";
        return placeholder;
      }

      const image = document.createElement("img");
      image.className = "book-cover";
      image.src = cover;
      image.alt = `《${normalizeText(book.title, "未命名书籍")}》封面`;
      image.loading = "lazy";
      image.referrerPolicy = "no-referrer";
      image.onerror = () => {
        const placeholder = document.createElement("div");
        placeholder.className = "cover-placeholder";
        placeholder.textContent = "暂无封面";
        image.replaceWith(placeholder);
      };
      return image;
    }

    function createBookCard(book, index) {
      const node = template.content.cloneNode(true);
      const detailUrl = normalizeText(book.detail_url, `book.html?id=${index}`);
      node.querySelector(".cover-wrap").appendChild(createCover(book));
      node.querySelector(".book-date").textContent = normalizeText(book.recommended_date, "暂无日期");
      node.querySelector(".book-title").textContent = `《${normalizeText(book.title, "未命名书籍")}》`;
      node.querySelector(".book-meta").textContent = `作者：${normalizeText(book.author, "暂无作者")}`;
      node.querySelector(".book-rating").textContent = `评分：${normalizeText(book.rating, "暂无评分")}`;
      node.querySelector(".book-summary").textContent = createSummaryExcerpt(book.summary);
      node.querySelector(".detail-link").href = detailUrl;
      return node;
    }

    function renderBookList(container, books, emptyText, limit) {
      container.innerHTML = "";
      if (!Array.isArray(books) || books.length === 0) {
        container.innerHTML = `<p class="empty">${emptyText}</p>`;
        return;
      }

      books.slice(0, limit).forEach((book, index) => {
        container.appendChild(createBookCard(book, index));
      });
    }


    function getSubscribeConfig() {
      const config = window.PAIGE_SITE_CONFIG || {};
      return {
        supabaseUrl: normalizeText(config.supabaseUrl, "").replace(/\/$/, ""),
        supabaseAnonKey: normalizeText(config.supabaseAnonKey, "")
      };
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function submitSubscription(email) {
      const { supabaseUrl, supabaseAnonKey } = getSubscribeConfig();
      if (!supabaseUrl || !supabaseAnonKey) {
        throw new Error("订阅服务暂未配置。");
      }

      const response = await fetch(`${supabaseUrl}/rest/v1/subscribers`, {
        method: "POST",
        headers: {
          apikey: supabaseAnonKey,
          Authorization: `Bearer ${supabaseAnonKey}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal"
        },
        body: JSON.stringify({ email, active: true })
      });

      if (response.status === 409) {
        return "这个邮箱已经订阅。";
      }
      if (!response.ok) {
        throw new Error("订阅保存失败，请稍后再试。");
      }
      return "订阅成功。";
    }

    if (subscribeForm) {
      subscribeForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const email = normalizeText(subscribeEmail.value, "").toLowerCase();
        if (!isValidEmail(email)) {
          subscribeStatus.textContent = "请输入有效邮箱。";
          return;
        }

        subscribeButton.disabled = true;
        subscribeStatus.textContent = "正在提交...";
        try {
          subscribeStatus.textContent = await submitSubscription(email);
          subscribeForm.reset();
        } catch (error) {
          subscribeStatus.textContent = error.message || "订阅失败，请稍后再试。";
        } finally {
          subscribeButton.disabled = false;
        }
      });
    }

    function loadJson(path) {
      return fetch(path, { cache: "no-store" }).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      });
    }

    Promise.all([loadJson("today.json"), loadJson("books.json")])
      .then(([todayBooks, recentBooks]) => {
        renderBookList(todayList, todayBooks, "今日推荐还没有生成。", 3);
        renderBookList(recentList, recentBooks, "还没有可公开展示的荐书记录。", 15);
      })
      .catch(() => {
        todayList.innerHTML = '<p class="empty">今日推荐暂时无法加载。</p>';
        recentList.innerHTML = '<p class="empty">书单暂时无法加载，请稍后再试。</p>';
      });
  </script>
</body>
</html>
