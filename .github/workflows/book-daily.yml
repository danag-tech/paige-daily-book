name: Book Daily

on:
  workflow_dispatch:

concurrency:
  group: book-daily
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  book-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run book daily job
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit sent books history, book pool, and website data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f sent_books.json ]; then
            git add sent_books.json data/book_pool.json website/books.json website/today.json website/covers
            if ! git diff --cached --quiet; then
              git commit -m "Update sent books history"
              git pull --rebase origin main
              git push
            else
              echo "No sent books history or book pool changes to commit."
            fi
          else
            echo "No sent_books.json found."
          fi
      - name: Create website site config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            python -c 'import json, os; from pathlib import Path; config={"supabaseUrl": os.environ["SUPABASE_URL"], "supabaseAnonKey": os.environ["SUPABASE_ANON_KEY"]}; Path("website/site_config.js").write_text("window.PAIGE_SITE_CONFIG = " + json.dumps(config) + ";\n", encoding="utf-8")'
          else
            echo "Supabase website subscription config is not set."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
