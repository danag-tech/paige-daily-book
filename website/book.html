<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%270.9em%27 font-size=%2790%27%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <title>图书详情 - Paige 每日荐书</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WSLGYCKJJ9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WSLGYCKJJ9');
  </script>
</head>
<body>
  <main class="page-shell detail-shell">
    <header class="site-header detail-header">
      <a class="back-link" href="index.html">返回书库</a>
      <h1 id="detail-title">图书详情</h1>
    </header>

    <article id="book-detail" class="detail-card" aria-live="polite">
      <p class="loading">正在加载图书详情...</p>
    </article>
  </main>

  <script>
    const detail = document.querySelector("#book-detail");
    const title = document.querySelector("#detail-title");

    function normalizeText(value, fallback) {
      if (typeof value !== "string") {
        return fallback;
      }
      const text = value.trim();
      return text || fallback;
    }

    function getBookId() {
      const params = new URLSearchParams(window.location.search);
      const id = Number.parseInt(params.get("id") || "0", 10);
      return Number.isFinite(id) && id >= 0 ? id : 0;
    }

    function createCover(book) {
      const cover = normalizeText(book.cover, "");
      if (!cover) {
        const placeholder = document.createElement("div");
        placeholder.className = "detail-cover-placeholder";
        placeholder.textContent = "暂无封面";
        return placeholder;
      }

      const image = document.createElement("img");
      image.className = "detail-cover";
      image.src = cover;
      image.alt = `《${normalizeText(book.title, "未命名书籍")}》封面`;
      image.referrerPolicy = "no-referrer";
      image.onerror = () => {
        const placeholder = document.createElement("div");
        placeholder.className = "detail-cover-placeholder";
        placeholder.textContent = "暂无封面";
        image.replaceWith(placeholder);
      };
      return image;
    }

    function getBookSearchTerm(book) {
      const isbn = normalizeText(book.isbn || book.ISBN, "").replace(/[\s-]/g, "");
      return isbn || normalizeText(book.title, "");
    }

    function buildSearchUrl(baseUrl, book) {
      return `${baseUrl}${encodeURIComponent(getBookSearchTerm(book))}`;
    }

    function createReadingLink(label, url) {
      const link = document.createElement("a");
      link.className = "primary-link";
      link.href = url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = label;
      return link;
    }
    function renderBook(book) {
      const bookTitle = normalizeText(book.title, "未命名书籍");
      title.textContent = `《${bookTitle}》`;
      detail.innerHTML = "";

      const media = document.createElement("div");
      media.className = "detail-media";
      media.appendChild(createCover(book));

      const content = document.createElement("div");
      content.className = "detail-content";

      const author = document.createElement("p");
      author.className = "book-meta";
      author.textContent = `作者：${normalizeText(book.author, "暂无作者")}`;

      const rating = document.createElement("p");
      rating.className = "book-rating";
      rating.textContent = `评分：${normalizeText(book.rating, "暂无评分")}`;

      const summaryTitle = document.createElement("h3");
      summaryTitle.className = "section-title";
      summaryTitle.textContent = "简介";

      const summary = document.createElement("p");
      summary.className = "detail-summary";
      summary.textContent = normalizeText(book.summary, "暂无简介");

      const actions = document.createElement("div");
      actions.className = "detail-actions";
      const readingLabel = document.createElement("span");
      readingLabel.className = "reading-label";
      readingLabel.textContent = "\u9605\u8bfb/\u8d2d\u4e70\uff1a";
      actions.append(
        readingLabel,
        createReadingLink("\u5fae\u4fe1\u8bfb\u4e66", buildSearchUrl("https://weread.qq.com/web/search/books?keyword=", book)),
        createReadingLink("\u8c46\u74e3\u8bfb\u4e66", buildSearchUrl("https://search.douban.com/book/subject_search?search_text=", book)),
        createReadingLink("\u4eac\u4e1c\u56fe\u4e66", buildSearchUrl("https://search.jd.com/Search?keyword=", book))
      );

      content.append(author, rating, media, summaryTitle, summary, actions);
      detail.append(content);
    }

    fetch("books.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then((books) => {
        const book = Array.isArray(books) ? books[getBookId()] : null;
        if (!book) {
          detail.innerHTML = '<p class="empty">没有找到这本书。</p>';
          return;
        }
        renderBook(book);
      })
      .catch(() => {
        detail.innerHTML = '<p class="empty">图书详情暂时无法加载，请稍后再试。</p>';
      });
  </script>
</body>
</html>
