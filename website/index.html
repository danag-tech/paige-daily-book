<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%270.9em%27 font-size=%2790%27%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <title>Paige每日荐书</title>
  <link rel="stylesheet" href="style.css">
  <script src="placeholder_cover.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WSLGYCKJJ9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WSLGYCKJJ9');
  </script>
</head>
<body>
  <nav class="top-nav" aria-label="页面导航">
    <a class="nav-brand" href="#top">Paige每日荐书</a>
    <div class="nav-actions">
      <a href="#today">今日推荐</a>
      <a href="#recent">近期荐书</a>
    </div>
  </nav>

  <main id="top" class="page-shell">
    <header class="site-header">
      <p class="eyebrow">PAIGE BOOK DAILY</p>
      <h1>Paige每日荐书</h1>
      <p class="intro">每天推荐三本好书，记录持续积累的阅读选择。</p>
    </header>

    <section id="today" class="home-section today-section" aria-labelledby="today-heading">
      <div class="section-head">
        <p class="eyebrow">Today</p>
        <h2 id="today-heading">今日推荐</h2>
      </div>
      <div id="today-list" class="today-list" aria-live="polite">
        <p class="loading">正在加载今日推荐...</p>
      </div>
    </section>

    <section class="home-section subscribe-panel" aria-labelledby="subscribe-heading">
      <div>
        <p class="eyebrow">Email Digest</p>
        <h2 id="subscribe-heading">邮箱订阅</h2>
        <p class="subscribe-copy">输入邮箱订阅每日荐书，发布后会收到 Paige 自动发送的阅读邮件。</p>
      </div>
      <form id="subscribe-form" class="subscribe-form" aria-label="邮箱订阅表单">
        <input id="subscribe-email" type="email" placeholder="your@email.com" aria-label="邮箱地址" autocomplete="email" required>
        <button id="subscribe-button" type="submit">订阅</button>
        <p id="subscribe-status" class="subscribe-status" role="status" aria-live="polite"></p>
      </form>
      <dialog id="subscribe-confirmation" class="subscribe-confirmation">
        <div class="subscribe-confirmation-content">
          <h3>确认订阅邮箱</h3>
          <p>请确认你的订阅邮箱：</p>
          <p id="confirmation-email" class="confirmation-email"></p>
          <p>确认后，该邮箱将每天收到 Paige 每日荐书邮件。</p>
          <div class="confirmation-actions">
            <button id="cancel-confirmation" type="button" class="confirmation-secondary">返回修改</button>
            <button id="confirm-subscription" type="button" class="confirmation-primary">确认订阅</button>
          </div>
        </div>
      </dialog>
    </section>

    <section id="recent" class="home-section" aria-labelledby="recent-heading">
      <div class="section-head">
        <p class="eyebrow">Archive</p>
        <h2 id="recent-heading">最近 15 本荐书</h2>
      </div>
      <div id="book-list" class="book-list" aria-live="polite">
        <p class="loading">正在加载书单...</p>
      </div>
    </section>
  </main>

  <template id="book-card-template">
    <article class="book-card">
      <div class="cover-wrap"></div>
      <div class="book-content">
        <p class="book-date"></p>
        <h3 class="book-title"></h3>
        <p class="book-meta"></p>
        <p class="book-rating"></p>
        <p class="book-summary"></p>
        <a class="detail-link" href="book.html">查看详情</a>
      </div>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="site_config.js"></script>
  <script>
    const recentList = document.querySelector("#book-list");
    const todayList = document.querySelector("#today-list");
    const template = document.querySelector("#book-card-template");
    const subscribeForm = document.querySelector("#subscribe-form");
    const subscribeEmail = document.querySelector("#subscribe-email");
    const subscribeButton = document.querySelector("#subscribe-button");
    const subscribeStatus = document.querySelector("#subscribe-status");
    const confirmationDialog = document.querySelector("#subscribe-confirmation");
    const confirmationEmail = document.querySelector("#confirmation-email");
    const cancelConfirmation = document.querySelector("#cancel-confirmation");
    const confirmSubscription = document.querySelector("#confirm-subscription");
    let pendingSubscriptionEmail = "";

    function normalizeText(value, fallback) {
      if (typeof value !== "string") {
        return fallback;
      }
      const text = value.trim();
      return text || fallback;
    }

    function createSummaryExcerpt(summary) {
      const text = normalizeText(summary, "暂无简介");
      if (text.length <= 120) {
        return text;
      }
      return `${text.slice(0, 120)}…`;
    }

    function createCover(book) {
      const cover = normalizeText(book.cover, "");
      if (!cover) {
        return createPlaceholderCover(book, "book-cover");
      }

      const image = document.createElement("img");
      image.className = "book-cover";
      image.src = cover;
      image.alt = `《${normalizeText(book.title, "未命名书籍")}》封面`;
      image.loading = "lazy";
      image.referrerPolicy = "no-referrer";
      image.onerror = () => {
        image.replaceWith(createPlaceholderCover(book, "book-cover"));
      };
      return image;
    }

    function createBookCard(book, index, options = {}) {
      const node = template.content.cloneNode(true);
      const detailUrl = normalizeText(book.detail_url, `book.html?id=${index}`);
      const card = node.querySelector(".book-card");
      const coverWrap = node.querySelector(".cover-wrap");
      coverWrap.appendChild(createCover(book));
      node.querySelector(".book-date").textContent = normalizeText(book.recommended_date, "暂无日期");
      node.querySelector(".book-title").textContent = `《${normalizeText(book.title, "未命名书籍")}》`;
      node.querySelector(".book-meta").textContent = `作者：${normalizeText(book.author, "暂无作者")}`;
      node.querySelector(".book-rating").textContent = `评分：${normalizeText(book.rating, "暂无评分")}`;
      node.querySelector(".book-summary").textContent = options.fullSummary
        ? normalizeText(book.summary, "暂无简介")
        : createSummaryExcerpt(book.summary);
      node.querySelector(".detail-link").href = detailUrl;
      if (options.todayLayout) {
        card.classList.add("book-card--today");
        node.querySelector(".book-date").remove();
        node.querySelector(".book-rating").after(coverWrap);
      }
      return node;
    }

    function renderBookList(container, books, emptyText, limit, options = {}) {
      container.innerHTML = "";
      if (!Array.isArray(books) || books.length === 0) {
        container.innerHTML = `<p class="empty">${emptyText}</p>`;
        return;
      }

      books.slice(0, limit).forEach((book, index) => {
        container.appendChild(createBookCard(book, index, options));
      });
    }


    function getSubscribeConfig() {
      const generatedConfig = window.PAIGE_SITE_CONFIG || {};
      const publicConfig = window.PAIGE_SUPABASE_CONFIG || {};
      const supabaseUrl = normalizeText(generatedConfig.supabaseUrl, normalizeText(publicConfig.SUPABASE_URL, ""));
      const supabaseAnonKey = normalizeText(generatedConfig.supabaseAnonKey, normalizeText(publicConfig.SUPABASE_ANON_KEY, ""));
      return {
        supabaseUrl: supabaseUrl.replace(/\/$/, ""),
        supabaseAnonKey
      };
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function submitSubscription(email) {
      const { supabaseUrl, supabaseAnonKey } = getSubscribeConfig();
      if (!supabaseUrl || !supabaseAnonKey) {
        throw new Error("订阅服务暂未配置。");
      }

      const response = await fetch(`${supabaseUrl}/rest/v1/rpc/subscribe_by_email`, {
        method: "POST",
        headers: {
          apikey: supabaseAnonKey,
          Authorization: `Bearer ${supabaseAnonKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });

      if (!response.ok) {
        throw new Error("订阅保存失败，请稍后再试。");
      }

      const rawResult = await response.text();
      let result = rawResult;
      try {
        result = JSON.parse(rawResult);
      } catch (error) {
        // Keep the plain text response fallback for older PostgREST versions.
      }
      if (result === "already_subscribed") {
        return "该邮箱已经订阅";
      }
      if (result === "resubscribed") {
        return "重新订阅成功";
      }
      return "订阅成功";
    }

    function closeConfirmation() {
      pendingSubscriptionEmail = "";
      if (confirmationDialog && confirmationDialog.open) {
        confirmationDialog.close();
      }
    }

    async function confirmPendingSubscription() {
      if (!pendingSubscriptionEmail) {
        closeConfirmation();
        return;
      }

      const email = pendingSubscriptionEmail;
      confirmSubscription.disabled = true;
      cancelConfirmation.disabled = true;
      subscribeButton.disabled = true;
      subscribeStatus.textContent = "正在提交...";
      try {
        subscribeStatus.textContent = await submitSubscription(email);
        subscribeForm.reset();
        closeConfirmation();
      } catch (error) {
        subscribeStatus.textContent = error.message || "订阅失败，请稍后再试。";
      } finally {
        confirmSubscription.disabled = false;
        cancelConfirmation.disabled = false;
        subscribeButton.disabled = false;
      }
    }

    if (subscribeForm) {
      subscribeForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const email = normalizeText(subscribeEmail.value, "").toLowerCase();
        if (!isValidEmail(email)) {
          subscribeStatus.textContent = "请输入有效邮箱。";
          return;
        }

        pendingSubscriptionEmail = email;
        confirmationEmail.textContent = email;
        if (confirmationDialog && typeof confirmationDialog.showModal === "function") {
          confirmationDialog.showModal();
        } else if (window.confirm(`请确认你的订阅邮箱：\n\n${email}\n\n确认后，该邮箱将每天收到 Paige 每日荐书邮件。`)) {
          confirmPendingSubscription();
        }
      });
    }

    if (cancelConfirmation) {
      cancelConfirmation.addEventListener("click", closeConfirmation);
    }
    if (confirmSubscription) {
      confirmSubscription.addEventListener("click", confirmPendingSubscription);
    }

    function loadJson(path) {
      return fetch(path, { cache: "no-store" }).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      });
    }

    Promise.all([loadJson("today.json"), loadJson("books.json")])
      .then(([todayBooks, recentBooks]) => {
        renderBookList(todayList, todayBooks, "今日推荐还没有生成。", 3, { fullSummary: true, todayLayout: true });
        renderBookList(recentList, recentBooks, "还没有可公开展示的荐书记录。", 15);
      })
      .catch(() => {
        todayList.innerHTML = '<p class="empty">今日推荐暂时无法加载。</p>';
        recentList.innerHTML = '<p class="empty">书单暂时无法加载，请稍后再试。</p>';
      });
  </script>
</body>
</html>
